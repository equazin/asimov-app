<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Selección de Artículos</title>
  <style>
    :root {
      --bg: #14171D;
      --surface: #1b1f27;
      --card: #232833;
      --accent: #FF6A2B;
      --accent-hover: #e85e25;
      --border: #343a43;
      --border-soft: #2c333d;
      --text: #f2f3f5;
      --text-muted: #9aa1ab;
      --input-bg: #171b22;
      --select-bg: rgba(255,106,43,0.15);
      --select-border: rgba(255,106,43,0.5);
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: 32px;
      user-select: none;
    }

    /* ── Search bar ─────────────────────────────── */
    .search-panel {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-soft);
    }

    .search-label {
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .search-input {
      height: 32px;
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(255,106,43,0.18);
    }
    .search-input::placeholder { color: #6f7784; }

    /* ── Buttons ─────────────────────────────────── */
    .btn {
      height: 32px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.12s;
      outline: none;
    }
    .btn:hover { background: #2a303b; }
    .btn:active { background: #1e2430; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    /* ── Table ───────────────────────────────────── */
    .table-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      background: var(--input-bg);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      position: sticky;
      top: 0;
      background: var(--card);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-align: left;
      padding: 8px 8px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border-soft);
      z-index: 10;
      white-space: nowrap;
    }
    th:last-child { border-right: none; }

    td {
      padding: 5px 8px;
      font-size: 11px;
      border-bottom: 1px solid var(--border-soft);
      border-right: 1px solid rgba(52,58,67,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    td:last-child { border-right: none; }

    tbody tr { cursor: pointer; background: var(--input-bg); }
    tbody tr:nth-child(even) { background: #1c2129; }
    tbody tr:hover { background: var(--card); }

    tbody tr.selected {
      background: var(--select-bg) !important;
      outline: 1px solid var(--select-border);
      outline-offset: -1px;
    }
    tbody tr.selected td { color: #fff; }

    .col-code { width: 80px; font-family: "Cascadia Code", Consolas, monospace; font-size: 11px; color: var(--accent); }
    .col-desc { min-width: 280px; }
    .col-price { width: 80px; text-align: right; font-family: "Cascadia Code", Consolas, monospace; }
    .col-iva { width: 50px; text-align: center; color: var(--text-muted); }
    .col-stock { width: 50px; text-align: center; font-weight: 700; }
    .col-compro { width: 50px; text-align: center; color: var(--text-muted); }
    .col-entr { width: 50px; text-align: center; color: var(--text-muted); }
    .col-line { width: 90px; }
    .col-cat { width: 100px; color: var(--text-muted); }

    /* ── Badges ──────────────────────────────────── */
    .badge-air {
      display: inline-block;
      background: rgba(34,197,94,0.15);
      color: #4ade80;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid rgba(34,197,94,0.3);
      letter-spacing: 0.5px;
    }
    .badge-local {
      display: inline-block;
      background: rgba(148,163,184,0.1);
      color: #94a3b8;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid rgba(148,163,184,0.2);
      letter-spacing: 0.5px;
    }

    /* ── Bottom panel ────────────────────────────── */
    .bottom-panel {
      padding: 10px 16px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stock-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stock-box-title {
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      font-size: 9px;
      font-weight: 800;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    .record-count {
      margin-left: auto;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 12px;
      font-weight: bold;
      color: var(--text-muted);
    }

    .actions-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .actions-bar .btn { flex: 1; height: 34px; font-size: 12px; }

    /* ── Scrollbar ────────────────────────────────── */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #343a43; border-radius: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
  </style>
</head>
<body>

  <!-- Search panel -->
  <div class="search-panel">
    <span class="search-label">Buscar</span>
    <input type="text" class="search-input" id="txtSearch" placeholder="Buscar por código, descripción, línea o categoría..." autofocus />
  </div>

  <!-- Table panel -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="col-code">Código</th>
          <th class="col-desc">Descripción</th>
          <th class="col-price" style="text-align:right;">Precio USD</th>
          <th class="col-iva">IVA</th>
          <th class="col-stock">Stock</th>
          <th class="col-compro">Compro</th>
          <th class="col-entr">Entr</th>
          <th class="col-line">Línea</th>
          <th class="col-cat">Categoría</th>
          <th style="width:55px;text-align:center;">Origen</th>
        </tr>
      </thead>
      <tbody id="productTableBody">
      </tbody>
    </table>
  </div>

  <!-- Bottom panel -->
  <div class="bottom-panel">
    <div class="info-bar">
      <div class="stock-box">
        <span class="stock-box-title">STOCK</span>
        <span id="lblStockCount">0</span>
      </div>
      <span class="record-count" id="lblRecordCount">0 / 0</span>
    </div>

    <div class="actions-bar">
      <button class="btn btn-primary" id="btnSelect">Seleccionar</button>
      <button class="btn" id="btnNew">Nuevo</button>
      <button class="btn" id="btnModify" disabled>Modificar</button>
      <button class="btn" id="btnExit">Salir</button>
    </div>
  </div>

  <script>
    let products = [];
    let filteredProducts = [];
    let selectedIndex = 0;
    let currentRowId = "";

    const txtSearch = document.getElementById("txtSearch");
    const tableBody = document.getElementById("productTableBody");
    const lblStockCount = document.getElementById("lblStockCount");
    const lblRecordCount = document.getElementById("lblRecordCount");
    const btnSelect = document.getElementById("btnSelect");
    const btnNew = document.getElementById("btnNew");
    const btnExit = document.getElementById("btnExit");

    if (window.asimovProductSelection) {
      window.asimovProductSelection.onSetRowId((rowId) => {
        currentRowId = rowId;
      });

      window.asimovProductSelection.onNewArticleAdded((article) => {
        if (article) {
          products.unshift(article);
          filterAndRender();
        }
      });

      window.asimovProductSelection.onProductsLoaded((loaded) => {
        if (loaded && loaded.length > 0) {
          products = loaded;
          filterAndRender();
        }
      });
    }

    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    function renderTable() {
      tableBody.innerHTML = "";
      filteredProducts.forEach((prod, index) => {
        const tr = document.createElement("tr");
        if (index === selectedIndex) tr.className = "selected";

        const srcBadge = (prod.source || "local") === "air"
          ? '<span class="badge-air">AIR</span>'
          : '<span class="badge-local">LOCAL</span>';

        tr.innerHTML = `
          <td class="col-code">${escapeHtml(prod.codigo)}</td>
          <td class="col-desc">${escapeHtml(prod.descripcion)}</td>
          <td class="col-price">$ ${parseFloat(prod.importe).toFixed(2)}</td>
          <td class="col-iva">${escapeHtml(prod.iva)}%</td>
          <td class="col-stock">${escapeHtml(prod.st)}</td>
          <td class="col-compro">${escapeHtml(prod.compro)}</td>
          <td class="col-entr">${escapeHtml(prod.entr)}</td>
          <td class="col-line">${escapeHtml(prod.linea)}</td>
          <td class="col-cat">${escapeHtml(prod.categoria)}</td>
          <td style="text-align:center;">${srcBadge}</td>
        `;

        tr.addEventListener("click", () => selectIndex(index));
        tr.addEventListener("dblclick", () => submitSelection());
        tableBody.appendChild(tr);
      });

      if (filteredProducts[selectedIndex]) {
        lblStockCount.textContent = filteredProducts[selectedIndex].st;
        lblRecordCount.textContent = `${selectedIndex + 1} / ${filteredProducts.length}`;
      } else {
        lblStockCount.textContent = "0";
        lblRecordCount.textContent = `0 / ${filteredProducts.length}`;
      }

      const selectedRow = tableBody.querySelector(".selected");
      if (selectedRow) selectedRow.scrollIntoView({ block: "nearest" });
    }

    function selectIndex(index) {
      if (index >= 0 && index < filteredProducts.length) {
        selectedIndex = index;
        renderTable();
      }
    }

    function filterAndRender() {
      const term = txtSearch.value.toUpperCase();
      filteredProducts = products.filter(prod =>
        prod.codigo.toUpperCase().includes(term) ||
        prod.descripcion.toUpperCase().includes(term) ||
        prod.linea.toUpperCase().includes(term) ||
        prod.categoria.toUpperCase().includes(term)
      );
      selectedIndex = 0;
      renderTable();
    }

    function submitSelection() {
      const selected = filteredProducts[selectedIndex];
      if (selected && window.asimovProductSelection) {
        window.asimovProductSelection.selectProduct(selected, currentRowId);
      }
    }

    txtSearch.addEventListener("input", filterAndRender);

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown") { e.preventDefault(); selectIndex(selectedIndex + 1); }
      else if (e.key === "ArrowUp") { e.preventDefault(); selectIndex(selectedIndex - 1); }
      else if (e.key === "Enter") { e.preventDefault(); submitSelection(); }
      else if (e.key === "Escape") {
        e.preventDefault();
        if (window.asimovProductSelection) window.asimovProductSelection.selectProduct(null, currentRowId);
      }
    });

    btnSelect.addEventListener("click", submitSelection);
    btnNew.addEventListener("click", () => {
      if (window.asimovProductSelection) window.asimovProductSelection.openNewArticle();
    });
    const closeHandler = () => {
      if (window.asimovProductSelection) window.asimovProductSelection.selectProduct(null, currentRowId);
    };
    btnExit.addEventListener("click", closeHandler);

    filterAndRender();
  </script>
</body>
</html>
