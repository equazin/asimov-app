<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Selección de Artículos</title>
  <style>
    :root {
      --win-bg: #ece9d8;
      --win-btn-bg: #f0f0f0;
      --win-border-light: #ffffff;
      --win-border-dark: #808080;
      --win-border-darkest: #404040;
      --purple-title: #7a157a;
      --teal-header: #008080;
      --select-bg: #0a246a;
      --select-text: #ffffff;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      padding-top: 32px;
      background-color: var(--win-bg);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 11px;
      color: #000000;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border: 3px solid var(--win-bg);
    }

    /* Windows 98 style Bevel borders */
    .window-inset {
      border: 2px solid;
      border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
      background-color: #ffffff;
    }

    .window-outset {
      border: 2px solid;
      border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
    }

    /* Bevel buttons */
    .classic-btn {
      background-color: var(--win-btn-bg);
      border: 2px solid;
      border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
      padding: 2px 12px;
      font-family: inherit;
      font-size: 11px;
      font-weight: bold;
      color: #000000;
      cursor: pointer;
      outline: none;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .classic-btn:active {
      border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
      padding: 3px 11px 1px 13px;
    }

    .classic-btn:disabled {
      color: #808080;
      cursor: not-allowed;
    }

    /* Title bar */
    .title-bar {
      height: 26px;
      background: linear-gradient(90deg, var(--purple-title), #b85bb8);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      font-weight: bold;
      font-size: 12px;
      border-bottom: 1px solid var(--win-border-dark);
    }

    .title-bar-text {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .title-bar-close {
      width: 16px;
      height: 14px;
      background-color: var(--win-bg);
      border: 1px solid;
      border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
      color: #000;
      font-weight: bold;
      font-size: 9px;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .title-bar-close:active {
      border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
    }

    /* Search bar */
    .search-panel {
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: var(--win-bg);
    }

    .search-label {
      font-weight: bold;
      font-size: 11px;
    }

    .search-input {
      height: 24px;
      flex: 1;
      border: 2px solid;
      border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
      padding: 0 6px;
      outline: none;
      font-family: inherit;
      font-size: 12px;
      background-color: #ffffff;
    }

    .search-input:focus {
      border-color: #000000;
    }

    /* Table section */
    .table-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      margin: 0 10px;
      background-color: #ffffff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th {
      position: sticky;
      top: 0;
      background-color: var(--teal-header);
      color: #ffffff;
      text-align: left;
      font-weight: bold;
      font-size: 11px;
      padding: 4px 6px;
      border-right: 1px solid rgba(255,255,255,0.2);
      border-bottom: 1px solid var(--win-border-dark);
      z-index: 10;
    }

    td {
      padding: 3px 6px;
      font-size: 11px;
      border-right: 1px solid #e0e0e0;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-code { width: 70px; font-family: Consolas, monospace; }
    .col-desc { width: 280px; }
    .col-price { width: 70px; text-align: right; font-family: Consolas, monospace; }
    .col-iva { width: 50px; text-align: center; }
    .col-stock { width: 50px; text-align: center; font-weight: bold; }
    .col-compro { width: 50px; text-align: center; color: #666; }
    .col-entr { width: 50px; text-align: center; color: #666; }
    .col-line { width: 80px; }
    .col-cat { width: 100px; }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:nth-child(even) {
      background-color: #fafafa;
    }

    tbody tr.selected {
      background-color: var(--select-bg) !important;
      color: var(--select-text) !important;
    }

    tbody tr.selected td {
      border-right-color: rgba(255,255,255,0.1);
    }

    /* Bottom section */
    .bottom-panel {
      padding: 10px;
      background-color: var(--win-bg);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stock-box {
      background-color: #ffffca;
      border: 1px solid var(--win-border-dark);
      padding: 4px 10px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stock-box-title {
      background-color: #000080;
      color: #ffffff;
      padding: 2px 6px;
      font-size: 10px;
      border-radius: 2px;
    }

    .record-count {
      margin-left: auto;
      font-family: Consolas, monospace;
      font-size: 12px;
      font-weight: bold;
      color: #333333;
    }

    .actions-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .grow {
      flex: 1;
    }
  </style>
</head>
<body>

  <!-- Title bar -->
  <div class="title-bar">
    <div class="title-bar-text">
      <span>Selección de Artículos de Compra-Venta.</span>
    </div>
    <div class="title-bar-close" id="btnCloseWindow">×</div>
  </div>

  <!-- Search panel -->
  <div class="search-panel">
    <span class="search-label">DESCRIPCIÓN</span>
    <input type="text" class="search-input" id="txtSearch" placeholder="Escriba aquí para buscar..." autofocus />
    <button class="classic-btn" type="button">Cualquier Parte</button>
    <button class="classic-btn" type="button">Más Arriba &gt;&gt;</button>
    <button class="classic-btn" type="button">Stock Todos</button>
  </div>

  <!-- Table panel -->
  <div class="table-container window-inset">
    <table>
      <thead>
        <tr>
          <th style="width: 70px;">código</th>
          <th style="width: 280px;">descripción</th>
          <th style="width: 70px; text-align: right;">importe</th>
          <th style="width: 50px; text-align: center;">% iva</th>
          <th style="width: 50px; text-align: center;">st</th>
          <th style="width: 50px; text-align: center;">compro</th>
          <th style="width: 50px; text-align: center;">entr</th>
          <th style="width: 80px;">línea</th>
          <th style="width: 100px;">categoría</th>
        </tr>
      </thead>
      <tbody id="productTableBody">
        <!-- Products will be injected here -->
      </tbody>
    </table>
  </div>

  <!-- Bottom panel -->
  <div class="bottom-panel">
    <div class="info-bar">
      <div class="stock-box">
        <span class="stock-box-title">Stock</span>
        <span>Principal:</span>
        <span id="lblStockCount" style="color: #000080;">0</span>
      </div>
      <div>
        <span>Vendedores:</span>
        <span style="font-weight: bold;">Todos</span>
      </div>
      <div>
        <span>Clientes:</span>
        <span style="font-weight: bold;">Todos</span>
      </div>
      <button class="classic-btn" style="padding: 2px 6px;">Kardex</button>
      <button class="classic-btn" style="padding: 2px 6px;">Compr.</button>
      <button class="classic-btn" style="padding: 2px 6px;">Ajustar</button>
      <button class="classic-btn" style="padding: 2px 6px;">Expor.</button>
      <span class="record-count" id="lblRecordCount">0 / 0</span>
    </div>

    <div class="actions-bar">
      <button class="classic-btn grow" id="btnSelect" style="height: 30px;">Seleccionar</button>
      <button class="classic-btn grow" id="btnNew" style="height: 30px;">Nuevo</button>
      <button class="classic-btn grow" id="btnModify" style="height: 30px;" disabled>Modificar</button>
      <button class="classic-btn grow" id="btnExit" style="height: 30px;">Salir</button>
    </div>
  </div>

  <script>
    // Sample product database
    let products = [
      { codigo: "41089", descripcion: "NOTEBOOK MSI GL65 CORE I7", importe: "1850.00", iva: "10.50", st: "5", compro: "0", entr: "0", linea: "MSI", categoria: "NOTEBOOK" },
      { codigo: "41088", descripcion: "NOTEBOOK MSI MODERN 15 RYZEN 5", importe: "950.00", iva: "10.50", st: "12", compro: "0", entr: "0", linea: "MSI", categoria: "NOTEBOOK" },
      { codigo: "315951", descripcion: "PLACA ANBYTE USB 2.0 PCI 4P ANBYTE", importe: "12.50", iva: "10.50", st: "8", compro: "0", entr: "0", linea: "ANBYTE", categoria: "ACCESORIOS PC" },
      { codigo: "709095", descripcion: "DOCKING SATA 2.5Y 3.5 USB MANHATAN", importe: "35.00", iva: "10.50", st: "22", compro: "0", entr: "0", linea: "MANHATTAN", categoria: "ACCESORIOS PC" },
      { codigo: "524421", descripcion: "CAMARA IP INTELLINET SOHO MPEG4/JPEG", importe: "89.00", iva: "21.00", st: "3", compro: "0", entr: "0", linea: "INTELLINET", categoria: "CONECTIVIDAD" },
      { codigo: "709088", descripcion: "DOCKING SATA 2.5Y 3.5 USB/eSATA MANHATAN", importe: "45.00", iva: "10.50", st: "15", compro: "0", entr: "0", linea: "MANHATTAN", categoria: "ACCESORIOS PC" },
      { codigo: "956826", descripcion: "BLUETOOTH SENSOR USB 100M ANBYTE", importe: "8.50", iva: "10.50", st: "40", compro: "0", entr: "0", linea: "ANBYTE", categoria: "CONECTIVIDAD" },
      { codigo: "957107", descripcion: "COOLER FUENTE 8 X 8 X 0.25 3.P. GENERICOS", importe: "4.00", iva: "21.00", st: "150", compro: "0", entr: "0", linea: "GENERICO", categoria: "ACCESORIOS PC" },
      { codigo: "440837", descripcion: "CANDADO PARA NOTEBOOK/LCD 1.8MT MANHATTAN", importe: "15.00", iva: "21.00", st: "35", compro: "0", entr: "0", linea: "MANHATTAN", categoria: "ACCESORIOS PC" },
      { codigo: "41110", descripcion: "WIRELESS AIRFORCE-ONE 2 2.4GHZ 3 LAN 400MW KOZUMI", importe: "120.00", iva: "10.50", st: "10", compro: "0", entr: "0", linea: "KOZUMI", categoria: "CONECTIVIDAD" },
      { codigo: "41077", descripcion: "MP5 8GB MP4+CAM1.3+FM+VOZ+SPK TITAN 095", importe: "49.00", iva: "21.00", st: "0", compro: "0", entr: "0", linea: "TITAN", categoria: "MEMORIAS" },
      { codigo: "CB412A", descripcion: "IMP. HP LASERJET P1505", importe: "210.00", iva: "10.50", st: "2", compro: "0", entr: "0", linea: "HP", categoria: "IMPRESORAS" },
      { codigo: "40017", descripcion: "AMD A64 X2 4600+BOX SAM2", importe: "85.00", iva: "10.50", st: "18", compro: "0", entr: "0", linea: "AMD", categoria: "MICROPROCESADORES" },
      { codigo: "41080", descripcion: "DVDRW SLIM NB LG 8X (NOT. Y AIO) LGE-DMG10F", importe: "38.00", iva: "10.50", st: "14", compro: "4", entr: "-9", linea: "SAMSUNG", categoria: "OPTICOS" },
      { codigo: "FS390LA", descripcion: "NB HP 6735S-FS390LA SEMPRON 2.0G/1G/15.4/120G/DVD/WEBCAM/FRE", importe: "650.00", iva: "10.50", st: "1", compro: "0", entr: "0", linea: "HP", categoria: "NOTEBOOK" },
      { codigo: "41069", descripcion: "TV LCD SAMSUNG LN32A610 FULL HD L6 P1080", importe: "799.00", iva: "21.00", st: "4", compro: "0", entr: "0", linea: "SAMSUNG", categoria: "OFICINA" },
      { codigo: "PRD-001245", descripcion: "Motor electrico 5HP", importe: "450.00", iva: "21.00", st: "23", compro: "0", entr: "0", linea: "SIEMENS", categoria: "MOTORES" },
      { codigo: "PRD-000874", descripcion: "Banda transportadora 2m", importe: "1200.00", iva: "21.00", st: "8", compro: "0", entr: "0", linea: "FRENOS", categoria: "TRANSPORTE" },
      { codigo: "PRD-002156", descripcion: "Rodamiento 6205-2RS", importe: "15.50", iva: "21.00", st: "152", compro: "0", entr: "0", linea: "SKF", categoria: "RODAMIENTOS" },
      { codigo: "PRD-001564", descripcion: "Sensor inductivo M12", importe: "28.75", iva: "21.00", st: "5", compro: "0", entr: "0", linea: "SICK", categoria: "SENSORES" },
      { codigo: "PRD-000332", descripcion: "PLC Siemens S7-1200", importe: "850.00", iva: "21.00", st: "12", compro: "0", entr: "0", linea: "SIEMENS", categoria: "PLC" },
      { codigo: "PRD-001998", descripcion: "Variador de frecuencia 2HP", importe: "340.00", iva: "21.00", st: "0", compro: "0", entr: "0", linea: "WEG", categoria: "VARIADORES" },
      { codigo: "PRD-000921", descripcion: "Cable THHN 12 AWG (metro)", importe: "1.25", iva: "21.00", st: "245", compro: "0", entr: "0", linea: "PRYSMIAN", categoria: "CABLES" },
      { codigo: "PRD-001110", descripcion: "Interruptor termomagnetico 3P", importe: "45.00", iva: "21.00", st: "7", compro: "0", entr: "0", linea: "SCHNEIDER", categoria: "ELECTRICIDAD" }
    ];

    let filteredProducts = [...products];
    let selectedIndex = 0;
    let currentRowId = "";

    const txtSearch = document.getElementById("txtSearch");
    const tableBody = document.getElementById("productTableBody");
    const lblStockCount = document.getElementById("lblStockCount");
    const lblRecordCount = document.getElementById("lblRecordCount");
    const btnSelect = document.getElementById("btnSelect");
    const btnNew = document.getElementById("btnNew");
    const btnExit = document.getElementById("btnExit");
    const btnCloseWindow = document.getElementById("btnCloseWindow");

    // Receive rowId from main process
    if (window.asimovProductSelection) {
      window.asimovProductSelection.onSetRowId((rowId) => {
        currentRowId = rowId;
      });

      window.asimovProductSelection.onNewArticleAdded((article) => {
        if (article) {
          products.unshift(article);
          filterAndRender();
        }
      });

      window.asimovProductSelection.onProductsLoaded((loaded) => {
        if (loaded && loaded.length > 0) {
          products = loaded;
          filterAndRender();
        }
      });
    }

    function renderTable() {
      tableBody.innerHTML = "";
      filteredProducts.forEach((prod, index) => {
        const tr = document.createElement("tr");
        if (index === selectedIndex) {
          tr.className = "selected";
        }
        
        tr.innerHTML = `
          <td class="col-code">${prod.codigo}</td>
          <td class="col-desc">${prod.descripcion}</td>
          <td class="col-price">$ ${parseFloat(prod.importe).toFixed(2)}</td>
          <td class="col-iva">${prod.iva}</td>
          <td class="col-stock">${prod.st}</td>
          <td class="col-compro">${prod.compro}</td>
          <td class="col-entr">${prod.entr}</td>
          <td class="col-line">${prod.linea}</td>
          <td class="col-cat">${prod.categoria}</td>
        `;

        tr.addEventListener("click", () => {
          selectIndex(index);
        });

        tr.addEventListener("dblclick", () => {
          submitSelection();
        });

        tableBody.appendChild(tr);
      });

      if (filteredProducts[selectedIndex]) {
        lblStockCount.textContent = filteredProducts[selectedIndex].st;
        lblRecordCount.textContent = `${selectedIndex + 1} / ${filteredProducts.length}`;
      } else {
        lblStockCount.textContent = "0";
        lblRecordCount.textContent = `0 / ${filteredProducts.length}`;
      }

      // Scroll selected item into view if necessary
      const selectedRow = tableBody.querySelector(".selected");
      if (selectedRow) {
        selectedRow.scrollIntoView({ block: "nearest" });
      }
    }

    function selectIndex(index) {
      if (index >= 0 && index < filteredProducts.length) {
        selectedIndex = index;
        renderTable();
      }
    }

    function filterAndRender() {
      const term = txtSearch.value.toUpperCase();
      filteredProducts = products.filter(prod => 
        prod.codigo.toUpperCase().includes(term) || 
        prod.descripcion.toUpperCase().includes(term) || 
        prod.linea.toUpperCase().includes(term) ||
        prod.categoria.toUpperCase().includes(term)
      );

      selectedIndex = 0;
      renderTable();
    }

    function submitSelection() {
      const selected = filteredProducts[selectedIndex];
      if (selected && window.asimovProductSelection) {
        window.asimovProductSelection.selectProduct(selected, currentRowId);
      }
    }

    txtSearch.addEventListener("input", filterAndRender);

    // Keyboard navigation
    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectIndex(selectedIndex + 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        selectIndex(selectedIndex - 1);
      } else if (e.key === "Enter") {
        e.preventDefault();
        submitSelection();
      } else if (e.key === "Escape") {
        e.preventDefault();
        if (window.asimovProductSelection) {
          window.asimovProductSelection.selectProduct(null, currentRowId);
        }
      }
    });

    btnSelect.addEventListener("click", submitSelection);
    
    btnNew.addEventListener("click", () => {
      if (window.asimovProductSelection) {
        window.asimovProductSelection.openNewArticle();
      }
    });

    const closeHandler = () => {
      if (window.asimovProductSelection) {
        window.asimovProductSelection.selectProduct(null, currentRowId);
      }
    };
    btnExit.addEventListener("click", closeHandler);
    btnCloseWindow.addEventListener("click", closeHandler);

    // Initial render
    filterAndRender();
  </script>
</body>
</html>
