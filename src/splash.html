<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' data:; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>Asimov</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at 50% 115%, rgba(212,175,55,0.18), transparent 18rem),
        linear-gradient(180deg, #14532d 0%, #062b19 100%);
      color: #f5f5f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
    }
    .logo {
      width: 180px;
      height: 180px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(245,245,240,0.22);
      box-shadow: 0 24px 70px rgba(0,0,0,0.3), 0 0 0 8px rgba(245,245,240,0.05);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.7, 0.2, 1) 0.1s forwards;
    }
    .logo img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .tagline {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(245,245,240,0.68);
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.7, 0.2, 1) 0.3s forwards;
    }
    .progress-wrap {
      margin-top: 36px;
      width: 200px;
      height: 3px;
      background: rgba(245,245,240,0.18);
      border-radius: 4px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.7, 0.2, 1) 0.5s forwards;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #14532d, #d4af37);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .status {
      margin-top: 14px;
      font-size: 11.5px;
      color: rgba(245,245,240,0.62);
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.7, 0.2, 1) 0.5s forwards;
    }
    .version {
      position: absolute;
      bottom: 18px;
      font-size: 10.5px;
      color: rgba(245,245,240,0.46);
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="logo"><img src="icon.png" alt="Asimov" /></div>
  <div class="tagline">ERP empresarial modular</div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress"></div>
  </div>
  <div class="status" id="status">Conectando con el servidor…</div>
  <div class="version" id="version"></div>

  <script>
    const progress = document.getElementById("progress");
    const status = document.getElementById("status");
    const version = document.getElementById("version");

    if (window.bartezSplash) {
      window.bartezSplash.getVersion().then((v) => {
        version.textContent = v ? `v${v}` : "";
      });

      window.bartezSplash.onProgress((pct, msg) => {
        progress.style.width = pct + "%";
        if (msg) status.textContent = msg;
      });
    }
  </script>
</body>
</html>
