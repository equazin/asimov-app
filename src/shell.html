<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' data:; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>Asimov</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: Inter, -apple-system, "Segoe UI", system-ui, sans-serif;
      color: #f5f5f0;
      background:
        linear-gradient(90deg, rgba(212,175,55,0.13) 1px, transparent 1px),
        linear-gradient(180deg, rgba(212,175,55,0.08) 1px, transparent 1px),
        radial-gradient(circle at 50% 110%, rgba(212,175,55,0.2), transparent 22rem),
        linear-gradient(180deg, #14532d 0%, #062b19 64%, #03180e 100%);
      background-size: 44px 44px, 44px 44px, auto, auto;
      user-select: none;
    }
    .desktop {
      position: fixed;
      inset: 0 0 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 28px;
    }
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0.92;
    }
    .brand img {
      width: min(140px, 18vw);
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 28px;
      border: 1px solid rgba(245,245,240,0.24);
      box-shadow: 0 24px 70px rgba(0,0,0,0.34), 0 0 0 6px rgba(245,245,240,0.05);
    }
    .brand-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      max-width: 680px;
      width: 100%;
      gap: 10px;
    }
    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 10px;
      border-radius: 12px;
      border: 1px solid rgba(245,245,240,0.12);
      background: rgba(6,43,25,0.42);
      cursor: pointer;
      transition: background 120ms, border-color 120ms, transform 80ms;
      text-decoration: none;
      color: inherit;
    }
    .shortcut:hover {
      background: rgba(20,83,45,0.7);
      border-color: rgba(212,175,55,0.4);
      transform: translateY(-2px);
    }
    .shortcut:active { transform: translateY(0); }
    .shortcut .icon {
      font-size: 26px;
      line-height: 1;
    }
    .shortcut .label {
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      opacity: 0.88;
    }
    .shortcut .key {
      font-size: 10px;
      color: rgba(245,245,240,0.5);
      font-weight: 600;
    }
    .hint {
      max-width: 520px;
      text-align: center;
      color: rgba(245,245,240,0.52);
      font-size: 12px;
      line-height: 1.55;
    }
    .corner {
      position: fixed;
      right: 18px;
      top: 18px;
      color: rgba(245,245,240,0.32);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="corner">Escritorio</div>
  <main class="desktop" aria-label="Escritorio Asimov">
    <div class="brand">
      <img src="icon.png" alt="Asimov" />
      <div class="brand-name">Asimov</div>
    </div>

    <div class="shortcuts" id="shortcuts">
      <a class="shortcut" data-path="/admin/orders">
        <span class="icon">📋</span>
        <span class="label">Pedidos</span>
        <span class="key">Ctrl+2</span>
      </a>
      <a class="shortcut" data-path="/admin/quotes/new">
        <span class="icon">💰</span>
        <span class="label">Cotización</span>
      </a>
      <a class="shortcut" data-path="/admin/stock">
        <span class="icon">📦</span>
        <span class="label">Stock</span>
        <span class="key">Ctrl+3</span>
      </a>
      <a class="shortcut" data-path="/admin/invoices">
        <span class="icon">🧾</span>
        <span class="label">Facturas</span>
      </a>
      <a class="shortcut" data-path="/admin/cash-accounts">
        <span class="icon">💵</span>
        <span class="label">Caja</span>
        <span class="key">Ctrl+4</span>
      </a>
      <a class="shortcut" data-path="/admin/tickets">
        <span class="icon">🔧</span>
        <span class="label">Tickets</span>
      </a>
      <a class="shortcut" data-path="/admin/accounts">
        <span class="icon">👥</span>
        <span class="label">Cuentas</span>
      </a>
      <a class="shortcut" data-path="/admin/products">
        <span class="icon">🏷️</span>
        <span class="label">Productos</span>
      </a>
    </div>

    <div class="hint">
      Usá el menú superior o hacé click en los accesos rápidos.<br />
      Las pantallas se abren como ventanas sobre este fondo.
    </div>
  </main>

  <script>
    document.querySelectorAll(".shortcut[data-path]").forEach(el => {
      el.addEventListener("click", (e) => {
        e.preventDefault();
        const path = el.getAttribute("data-path");
        if (path && window.bartezDesktop) {
          window.bartezDesktop.openModule(path);
        }
      });
    });
  </script>
</body>
</html>
