<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' data:; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>Asimov</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      color: #f5f5f0;
      background:
        linear-gradient(90deg, rgba(212,175,55,0.13) 1px, transparent 1px),
        linear-gradient(180deg, rgba(212,175,55,0.08) 1px, transparent 1px),
        radial-gradient(circle at 50% 110%, rgba(212,175,55,0.2), transparent 22rem),
        linear-gradient(180deg, #14532d 0%, #062b19 64%, #03180e 100%);
      background-size: 44px 44px, 44px 44px, auto, auto;
      user-select: none;
    }
    .desktop {
      position: fixed;
      inset: 0 0 30px;
      display: grid;
      place-items: center;
      padding: 28px;
    }
    .brand {
      display: grid;
      justify-items: center;
      gap: 18px;
      opacity: 0.92;
    }
    .brand img {
      width: min(220px, 26vw);
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 34px;
      border: 1px solid rgba(245,245,240,0.24);
      box-shadow: 0 24px 70px rgba(0,0,0,0.34), 0 0 0 8px rgba(245,245,240,0.05);
    }
    .hint {
      max-width: 520px;
      text-align: center;
      color: rgba(245,245,240,0.7);
      font-size: 13px;
      line-height: 1.55;
      padding: 12px 16px;
      border: 1px solid rgba(245,245,240,0.12);
      border-radius: 10px;
      background: rgba(6,43,25,0.42);
    }
    .hint strong { color: #f5f5f0; }
    .corner {
      position: fixed;
      right: 18px;
      top: 18px;
      color: rgba(245,245,240,0.42);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="desktop" aria-label="Escritorio Asimov">
    <div class="brand">
      <img src="icon.png" alt="Asimov" />
      <div class="hint">
        <strong>Escritorio de operador</strong><br />
        Abrí módulos desde el menú superior. Las pantallas se muestran como ventanas emergentes sobre este fondo fijo.
      </div>
    </div>
  </main>
</body>
</html>
