<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>Asimov — Sin conexión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: #070a16;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .card {
      text-align: center;
      max-width: 420px;
      padding: 40px 36px;
    }
    .icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-wrap svg {
      width: 32px;
      height: 32px;
      stroke: #f87171;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .desc {
      margin-top: 10px;
      font-size: 13.5px;
      line-height: 1.6;
      color: #94a3b8;
    }
    .server-url {
      margin-top: 6px;
      font-size: 12px;
      color: #64748b;
      font-family: "Fira Code", "Cascadia Code", monospace;
      word-break: break-all;
    }
    .actions {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    button {
      height: 44px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }
    button:active { transform: scale(0.99); }
    .btn-primary {
      background: #38bdf8;
      color: #03131f;
      font-weight: 700;
    }
    .btn-primary:hover { background: #7dd3fc; }
    .btn-primary:disabled { opacity: 0.55; cursor: default; }
    .btn-secondary {
      background: #1e293b;
      color: #cbd5e1;
    }
    .btn-secondary:hover { background: #334155; }
    .status {
      margin-top: 14px;
      font-size: 12px;
      min-height: 18px;
      color: #94a3b8;
    }
    .status.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>No se pudo conectar</h1>
    <div class="desc">El servidor no respondió. Verificá tu conexión a internet o que el servidor esté activo.</div>
    <div class="server-url" id="serverUrl"></div>
    <div class="actions">
      <button class="btn-primary" id="retry">Reintentar conexión</button>
      <button class="btn-secondary" id="change">Cambiar de servidor</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const retryBtn = document.getElementById("retry");
    const changeBtn = document.getElementById("change");
    const status = document.getElementById("status");
    const serverUrl = document.getElementById("serverUrl");

    if (window.bartezOffline) {
      window.bartezOffline.getServerUrl().then((url) => {
        serverUrl.textContent = url || "";
      });

      retryBtn.addEventListener("click", async () => {
        retryBtn.disabled = true;
        status.textContent = "Conectando…";
        status.className = "status";
        try {
          const result = await window.bartezOffline.retry();
          if (result && result.ok) {
            status.textContent = "Conectado. Cargando…";
          } else {
            status.textContent = (result && result.error) || "Sigue sin responder.";
            status.className = "status error";
            retryBtn.disabled = false;
          }
        } catch {
          status.textContent = "Error al reintentar.";
          status.className = "status error";
          retryBtn.disabled = false;
        }
      });

      changeBtn.addEventListener("click", () => {
        window.bartezOffline.changeServer();
      });
    }
  </script>
</body>
</html>
