<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Selección de Clientes</title>
  <style>
    :root {
      --win-bg: #ece9d8;
      --win-btn-bg: #f0f0f0;
      --win-border-light: #ffffff;
      --win-border-dark: #808080;
      --win-border-darkest: #404040;
      --purple-title: #7a157a;
      --teal-header: #008080;
      --select-bg: #0a246a;
      --select-text: #ffffff;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      padding-top: 32px;
      background-color: var(--win-bg);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 11px;
      color: #000000;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border: 3px solid var(--win-bg);
    }

    .window-inset {
      border: 2px solid;
      border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
      background-color: #ffffff;
    }

    .classic-btn {
      background-color: var(--win-btn-bg);
      border: 2px solid;
      border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
      padding: 2px 12px;
      font-family: inherit;
      font-size: 11px;
      font-weight: bold;
      color: #000000;
      cursor: pointer;
      outline: none;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .classic-btn:active {
      border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
      padding: 3px 11px 1px 13px;
    }

    .classic-btn:disabled {
      color: #808080;
      cursor: not-allowed;
    }

    .title-bar {
      height: 26px;
      background: linear-gradient(90deg, var(--purple-title), #b85bb8);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      font-weight: bold;
      font-size: 12px;
      border-bottom: 1px solid var(--win-border-dark);
    }

    .title-bar-close {
      width: 16px;
      height: 14px;
      background-color: var(--win-bg);
      border: 1px solid;
      border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
      color: #000;
      font-weight: bold;
      font-size: 9px;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .title-bar-close:active {
      border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
    }

    .search-panel {
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: var(--win-bg);
    }

    .search-label {
      font-weight: bold;
      font-size: 11px;
    }

    .search-input {
      height: 24px;
      flex: 1;
      border: 2px solid;
      border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
      padding: 0 6px;
      outline: none;
      font-family: inherit;
      font-size: 12px;
      background-color: #ffffff;
    }

    .search-input:focus {
      border-color: #000000;
    }

    .table-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      margin: 0 10px;
      background-color: #ffffff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th {
      position: sticky;
      top: 0;
      background-color: var(--teal-header);
      color: #ffffff;
      text-align: left;
      font-weight: bold;
      font-size: 11px;
      padding: 4px 6px;
      border-right: 1px solid rgba(255,255,255,0.2);
      border-bottom: 1px solid var(--win-border-dark);
      z-index: 10;
    }

    td {
      padding: 3px 6px;
      font-size: 11px;
      border-right: 1px solid #e0e0e0;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-code { width: 70px; font-family: Consolas, monospace; }
    .col-name { width: 280px; }
    .col-address { width: 220px; }
    .col-phone { width: 140px; }
    .col-cuit { width: 120px; font-family: Consolas, monospace; }

    tbody tr { cursor: pointer; }
    tbody tr:nth-child(even) { background-color: #fafafa; }

    tbody tr.selected {
      background-color: var(--select-bg) !important;
      color: var(--select-text) !important;
    }

    tbody tr.selected td {
      border-right-color: rgba(255,255,255,0.1);
    }

    .bottom-panel {
      padding: 10px;
      background-color: var(--win-bg);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .record-count {
      margin-left: auto;
      font-family: Consolas, monospace;
      font-size: 12px;
      font-weight: bold;
      color: #333333;
    }

    .loading-msg {
      text-align: center;
      padding: 20px;
      color: #666;
      font-style: italic;
    }

    .actions-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .grow { flex: 1; }
  
/* ASIMOV-THEME-START */
:root{
  color-scheme: dark;
  --bg:#14171D; --surface:#14171D; --panel:#232833; --card:#232833;
  --accent:#FF6A2B; --accent-hover:#e85e25; --accent-light:#3a2a1e;
  --accent-lt:#3a2a1e; --border:#343a43; --border-soft:#2c333d;
  --text:#f2f3f5; --text-muted:#9aa1ab; --muted:#9aa1ab;
  --input-bg:#171b22; --input-focus:#FF6A2B; --header-bg:#1b1f27;
  --tab-active:#14171D; --tab-inactive:#14171D; --danger:#e5544b;
  --radius:9px;
}
html,body{ background:#0f1117 !important; }
body{ color:var(--text) !important; }
.header{
  background:#1b1f27 !important;
  border-bottom:1px solid var(--border-soft) !important;
  box-shadow:none !important;
  min-height:46px;
  padding:10px 16px !important;
}
.header-icon{ font-size:15px !important; }
.header-title{ color:#fff !important; font-size:13px !important; font-weight:700 !important; letter-spacing:0 !important; }
.header-badges{ gap:8px !important; }
.header-badge{
  background:rgba(255,106,43,0.10) !important;
  border:1px solid rgba(255,106,43,0.80) !important;
  color:var(--accent) !important;
  border-radius:999px !important;
  padding:2px 10px !important;
  box-shadow:none !important;
}
.close-btn{
  background:#232833 !important;
  border:1px solid #59616d !important;
  color:#d9dde4 !important;
  border-radius:8px !important;
}
.close-btn:hover{ background:#2a303b !important; }
.tabs{
  background:#14171D !important;
  border-top:0 !important;
  border-bottom:1px solid var(--border-soft) !important;
  box-shadow:none !important;
}
.tab{
  color:var(--text-muted) !important;
  border-bottom:2px solid transparent !important;
  margin-bottom:0 !important;
  padding:10px 16px !important;
  font-size:12px !important;
  font-weight:600 !important;
}
.tab:hover{ background:#191d25 !important; color:#d7dae0 !important; }
.tab.active{
  background:#14171D !important;
  color:var(--accent) !important;
  border-bottom-color:var(--accent) !important;
}
.content{ background:#14171D !important; }
.tab-panel{ background:#14171D !important; padding:16px !important; }
.tab-panel.active{ gap:12px !important; }
.tab-panel.items-panel{ padding:0 !important; }
.section-title{
  display:flex !important;
  align-items:center !important;
  gap:9px !important;
  margin:0 !important;
  padding:15px 16px 4px !important;
  background:var(--card) !important;
  border:1px solid var(--border) !important;
  border-bottom:0 !important;
  border-radius:var(--radius) var(--radius) 0 0 !important;
  color:#f3f4f6 !important;
  font-size:13px !important;
  font-weight:700 !important;
  letter-spacing:0 !important;
  text-transform:none !important;
}
.section-title::before{
  content:"" !important;
  display:inline-block !important;
  width:6px !important;
  height:18px !important;
  border-radius:999px !important;
  background:var(--accent) !important;
  flex:0 0 auto !important;
}
.section-title + .form-grid{
  margin-top:-12px !important;
  padding:22px 16px 16px !important;
  background:var(--card) !important;
  border:1px solid var(--border) !important;
  border-top:0 !important;
  border-radius:0 0 var(--radius) var(--radius) !important;
}
.section-title + .mini-table,
.section-title + textarea,
.section-title + input,
.section-title + select{
  margin-top:-12px !important;
}
.form-grid{ gap:10px 12px !important; }
.form-group,.field{ gap:5px !important; min-width:0 !important; }
label,.field label,.form-group label{
  color:var(--text-muted) !important;
  font-size:10px !important;
  font-weight:800 !important;
  letter-spacing:0.04em !important;
}
input,select,textarea,.cell-input{
  background:var(--input-bg) !important;
  color:var(--text) !important;
  border:1px solid var(--border) !important;
  border-radius:7px !important;
  box-shadow:none !important;
}
input:not(.cell-input),select,textarea{ min-height:30px !important; padding:6px 9px !important; }
input[readonly],textarea[readonly]{ background:#171b22 !important; color:var(--text-muted) !important; }
input::placeholder,textarea::placeholder{ color:#6f7784 !important; opacity:1 !important; }
input:focus,select:focus,textarea:focus,.cell-input:focus{
  border-color:var(--accent) !important;
  box-shadow:0 0 0 2px rgba(255,106,43,0.18) !important;
  outline:none !important;
}
option{ background:#232833; color:var(--text); }
.picker-btn,.field-btn,.btn-primary,.btn-save,.btn-sm:not(.secondary){
  background:var(--accent) !important;
  color:#fff !important;
  border-color:var(--accent) !important;
}
.picker-btn:hover,.field-btn:hover,.btn-primary:hover,.btn-save:hover,.btn-sm:not(.secondary):hover{
  background:var(--accent-hover) !important;
  border-color:var(--accent-hover) !important;
}
.btn-default,.btn-cancel,.btn-print,.btn-sm.secondary,.add-row-btn{
  background:#232833 !important;
  color:var(--text) !important;
  border:1px solid var(--border) !important;
}
.btn-default:hover,.btn-cancel:hover,.btn-print:hover,.btn-sm.secondary:hover,.add-row-btn:hover{
  background:#2a303b !important;
}
.btn-exit{
  background:#232833 !important;
  color:var(--text-muted) !important;
  border:1px solid var(--border) !important;
}
.btn-exit:hover{ background:#2a303b !important; color:#fff !important; }
.footer{
  background:#1b1f27 !important;
  border-top:1px solid var(--border-soft) !important;
  padding:12px 16px !important;
}
.footer-btn{
  border-radius:8px !important;
  min-height:30px !important;
  padding:7px 16px !important;
  font-size:12px !important;
}
.table-wrap,.mini-table{
  background:#171b22 !important;
  border:1px solid var(--border) !important;
  border-radius:8px !important;
}
thead th,th{
  background:#232833 !important;
  color:var(--text-muted) !important;
  border-color:var(--border) !important;
}
tbody tr{ background:#171b22 !important; border-color:var(--border) !important; }
tbody tr:nth-child(even),tr:nth-child(even){ background:#1c2129 !important; }
tbody tr:hover{ background:#232833 !important; }
td{ border-color:var(--border) !important; }
.items-toolbar,.totals-panel{ background:#14171D !important; }
.totals-card{
  background:var(--card) !important;
  border-color:var(--border) !important;
  border-radius:var(--radius) !important;
}
.totals-row.subtotal{ background:#1c2129 !important; }
.kbd,kbd{
  background:rgba(255,255,255,0.16) !important;
  color:#fff !important;
  border-color:rgba(255,255,255,0.18) !important;
}
.del-row-btn:hover,.del-row:hover{ background:#3a2323 !important; }
@media (max-width:760px){
  .form-grid{ grid-template-columns:repeat(2,minmax(0,1fr)) !important; }
  .form-group.span-2,.field.span-2{ grid-column:span 2 !important; }
  .form-group.span-3,.form-group.span-4,.field.span-3,.field.span-4{ grid-column:1 / -1 !important; }
}
::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-thumb{ background:#343a43; border-radius:5px; }
::-webkit-scrollbar-track{ background:#14171D; }
/* ASIMOV-THEME-END */
  </style>
</head>
<body>

  <div class="title-bar">
    <div><span>Selección de Clientes.</span></div>
    <div class="title-bar-close" id="btnCloseWindow">&times;</div>
  </div>

  <div class="search-panel">
    <span class="search-label">RAZÓN SOCIAL</span>
    <input type="text" class="search-input" id="txtSearch" placeholder="Escriba aquí para buscar..." autofocus />
    <button class="classic-btn" type="button">Cualquier Parte</button>
  </div>

  <div class="table-container window-inset">
    <table>
      <thead>
        <tr>
          <th class="col-code">código</th>
          <th class="col-name">razón social</th>
          <th class="col-address">domicilio</th>
          <th class="col-phone">teléfono</th>
          <th class="col-cuit">CUIT</th>
        </tr>
      </thead>
      <tbody id="clientTableBody">
        <tr><td colspan="5" class="loading-msg">Cargando clientes...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="bottom-panel">
    <div class="info-bar">
      <span class="record-count" id="lblRecordCount">0 / 0</span>
    </div>
    <div class="actions-bar">
      <button class="classic-btn grow" id="btnSelect" style="height: 30px;">Seleccionar</button>
      <button class="classic-btn grow" id="btnNew" style="height: 30px;">Nuevo</button>
      <button class="classic-btn grow" id="btnModify" style="height: 30px;" disabled>Modificar</button>
      <button class="classic-btn grow" id="btnExit" style="height: 30px;">Salir</button>
    </div>
  </div>

  <script>
    let clients = [];
    let filteredClients = [];
    let selectedIndex = 0;
    let contextId = "";

    const txtSearch = document.getElementById("txtSearch");
    const tableBody = document.getElementById("clientTableBody");
    const lblRecordCount = document.getElementById("lblRecordCount");
    const btnSelect = document.getElementById("btnSelect");
    const btnNew = document.getElementById("btnNew");
    const btnExit = document.getElementById("btnExit");
    const btnCloseWindow = document.getElementById("btnCloseWindow");

    if (window.asimovClientSelection) {
      window.asimovClientSelection.onInit((data) => {
        contextId = data.contextId || "";
      });

      window.asimovClientSelection.onClientsLoaded((loaded) => {
        clients = loaded || [];
        filterAndRender();
      });
    }

    function renderTable() {
      tableBody.innerHTML = "";
      if (filteredClients.length === 0) {
        const tr = document.createElement("tr");
        tr.innerHTML = '<td colspan="5" class="loading-msg">No se encontraron clientes.</td>';
        tableBody.appendChild(tr);
        lblRecordCount.textContent = "0 / 0";
        return;
      }

      filteredClients.forEach((cli, index) => {
        const tr = document.createElement("tr");
        if (index === selectedIndex) tr.className = "selected";

        tr.innerHTML =
          '<td class="col-code">' + (cli.codigo || cli.id || "") + '</td>' +
          '<td class="col-name">' + (cli.razonSocial || cli.name || "") + '</td>' +
          '<td class="col-address">' + (cli.domicilio || cli.address || "") + '</td>' +
          '<td class="col-phone">' + (cli.telefono || cli.phone || "") + '</td>' +
          '<td class="col-cuit">' + (cli.cuit || "") + '</td>';

        tr.addEventListener("click", () => selectIndex(index));
        tr.addEventListener("dblclick", () => submitSelection());
        tableBody.appendChild(tr);
      });

      lblRecordCount.textContent = (selectedIndex + 1) + " / " + filteredClients.length;

      const selectedRow = tableBody.querySelector(".selected");
      if (selectedRow) selectedRow.scrollIntoView({ block: "nearest" });
    }

    function selectIndex(index) {
      if (index >= 0 && index < filteredClients.length) {
        selectedIndex = index;
        renderTable();
      }
    }

    function filterAndRender() {
      const term = txtSearch.value.toUpperCase();
      filteredClients = clients.filter(function(cli) {
        var name = (cli.razonSocial || cli.name || "").toUpperCase();
        var code = String(cli.codigo || cli.id || "").toUpperCase();
        var addr = (cli.domicilio || cli.address || "").toUpperCase();
        var phone = (cli.telefono || cli.phone || "").toUpperCase();
        var cuit = (cli.cuit || "").toUpperCase();
        return name.includes(term) || code.includes(term) || addr.includes(term) || phone.includes(term) || cuit.includes(term);
      });
      selectedIndex = 0;
      renderTable();
    }

    function submitSelection() {
      var selected = filteredClients[selectedIndex];
      if (selected && window.asimovClientSelection) {
        window.asimovClientSelection.selectClient(selected, contextId);
      }
    }

    txtSearch.addEventListener("input", filterAndRender);

    window.addEventListener("keydown", function(e) {
      if (e.key === "ArrowDown") { e.preventDefault(); selectIndex(selectedIndex + 1); }
      else if (e.key === "ArrowUp") { e.preventDefault(); selectIndex(selectedIndex - 1); }
      else if (e.key === "Enter") { e.preventDefault(); submitSelection(); }
      else if (e.key === "Escape") {
        e.preventDefault();
        if (window.asimovClientSelection) window.asimovClientSelection.selectClient(null, contextId);
      }
    });

    btnSelect.addEventListener("click", submitSelection);

    btnNew.addEventListener("click", function() {
      if (window.asimovClientSelection) window.asimovClientSelection.openNewClient();
    });

    var closeHandler = function() {
      if (window.asimovClientSelection) window.asimovClientSelection.selectClient(null, contextId);
    };
    btnExit.addEventListener("click", closeHandler);
    btnCloseWindow.addEventListener("click", closeHandler);

    filterAndRender();
  </script>
</body>
</html>
